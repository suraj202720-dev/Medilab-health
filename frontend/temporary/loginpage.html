<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MediBuddy Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1cb5e0, #000046);
        }

        .login-container {
            width: 360px;
            padding: 28px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(14px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            color: #fff;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 6px;
        }

        .sub-text {
            font-size: 14px;
            margin-bottom: 18px;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #1cb5e0;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover:not(:disabled) {
            background: #1597bb;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .otp-box {
            position: relative;
        }

        .toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 16px;
            color: #333;
        }

        .link {
            margin-top: 14px;
            font-size: 14px;
            color: #e0f7ff;
            cursor: pointer;
        }

        .footer-text {
            font-size: 12px;
            margin-top: 8px;
            opacity: 0.8;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>MediBuddy</h2>
        <p class="sub-text">Login to access healthcare services</p>

        <input type="text" id="phone" placeholder="Enter Mobile Number" maxlength="10">

        <button id="sendOtpBtn">Send OTP</button>

        <div id="otpSection" class="hidden">
            <div class="otp-box">
                <input type="password" id="otp" placeholder="Enter OTP" maxlength="6">
                <span class="toggle" onclick="toggleOtp()">👁</span>
            </div>

            <button id="verifyOtpBtn">Verify & Login</button>
        </div>

        <p class="link">I have a Corporate Account</p>
        <p class="footer-text">Terms & Conditions • Privacy Policy</p>
    </div>

    <script>
        const phoneInput = document.getElementById("phone");
        const otpInput = document.getElementById("otp");
        const otpSection = document.getElementById("otpSection");
        const sendOtpBtn = document.getElementById("sendOtpBtn");
        const verifyOtpBtn = document.getElementById("verifyOtpBtn");

        /* SEND OTP */
        sendOtpBtn.addEventListener("click", () => {
            const phone = phoneInput.value.trim();

            if (!/^[6-9]\d{9}$/.test(phone)) {
                alert("Enter valid 10-digit mobile number");
                return;
            }

            sendOtpBtn.disabled = true;
            sendOtpBtn.innerText = "Sending OTP...";

            // FRONTEND DEMO (backend baad me connect hoga)
            setTimeout(() => {
                alert("OTP sent to " + phone);
                otpSection.classList.remove("hidden");
                sendOtpBtn.innerText = "OTP Sent";
            }, 1000);
        });

        /* VERIFY OTP */
        verifyOtpBtn.addEventListener("click", () => {
            const otp = otpInput.value.trim();

            if (otp.length !== 6) {
                alert("Enter 6-digit OTP");
                return;
            }

            verifyOtpBtn.disabled = true;
            verifyOtpBtn.innerText = "Verifying...";

            // FRONTEND DEMO LOGIN
            setTimeout(() => {
                alert("Login Successful!");
                window.location.href = "medilab.html"; // frontend page
            }, 1000);
        });

        /* SHOW / HIDE OTP */
        function toggleOtp() {
            otpInput.type = otpInput.type === "password" ? "text" : "password";
        }
    </script>

</body>

</html>
