<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Medilab Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        * {
            font-family: Segoe UI, system-ui;
            box-sizing: border-box
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f4c81, #1e88e5);
            min-height: 100vh;
            padding: 20px
        }

        .header {
            max-width: 1100px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            margin-bottom: 20px
        }

        .logoutbtn {
            background: #dc2626;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .25)
        }

        .status-flow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 30px
        }

        .circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .25)
        }

        .circle span {
            font-size: 34px
        }

        .circle p {
            margin: 6px 0 0;
            font-size: 14px
        }

        .c-new {
            background: linear-gradient(135deg, #2563eb, #1e40af)
        }

        .c-called {
            background: linear-gradient(135deg, #f59e0b, #b45309)
        }

        .c-done {
            background: linear-gradient(135deg, #16a34a, #166534)
        }

        .arrow {
            font-size: 40px;
            color: #1e88e5;
            font-weight: bold
        }

        .top-btns button {
            background: #1e88e5;
            color: #fff;
            border: none;
            padding: 7px 14px;
            border-radius: 8px;
            font-weight: 600;
            margin-right: 6px;
            cursor: pointer
        }

        .tabs {
            margin: 20px 0
        }

        .tabs button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            margin-right: 6px;
            font-weight: 600;
            cursor: pointer
        }

        .tabs .active {
            background: #1e88e5;
            color: #fff
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px
        }

        th {
            background: #0f4c81;
            color: #fff;
        }

        select {
            padding: 5px;
            border-radius: 6px
        }

        .delete {
            background: #dc2626;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 6px
        }

        .restore {
            background: #16a34a;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 6px
        }
    </style>
</head>

<body>

    <script>
        if (localStorage.getItem("adminLoggedIn") !== "true") { location.href = "admin-login.html"; }
    </script>

    <div class="header">
        <h1>🧪 Medilab Admin Panel</h1>
        <button class="logoutbtn" onclick="logout()">Logout</button>
    </div>

    <div class="container">

        <div class="status-flow">
            <div class="circle c-new"><span id="countNew">0</span>
                <p>New</p>
            </div>
            <div class="arrow">➜</div>
            <div class="circle c-called"><span id="countCalled">0</span>
                <p>Called</p>
            </div>
            <div class="arrow">➜</div>
            <div class="circle c-done"><span id="countDone">0</span>
                <p>Done</p>
            </div>
        </div>

        <div class="top-btns">
            <button onclick="loadContacts()">🔄 Refresh</button>
            <button onclick="exportExcel()">⬇ Export Excel</button>
        </div>

        <div class="tabs">
            <button id="tabContacts" class="active" onclick="showContacts()">🧾 Bookings</button>
            <button id="tabBookings" onclick="showBookings()">📞 Contacts</button>
            <button id="tabTrash" onclick="showTrash()">🗑 Deleted</button>
        </div>

        <div id="contactSection">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Message</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="contactBody"></tbody>
            </table>
        </div>

        <div id="bookingSection" style="display:none">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Patient</th>
                        <th>Mobile</th>
                        <th>Tests</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="bookingBody"></tbody>
            </table>
        </div>

        <div id="trashSection" style="display:none">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Type</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="trashBody"></tbody>
            </table>
        </div>

    </div>

    <script>
        const CONTACT_API = "http://localhost:5000/api/contacts";
        const BOOKING_API = "http://localhost:5000/api/bookings";

        let contacts = [], bookings = [], trash = [];

        const countNew = document.getElementById("countNew");
        const countCalled = document.getElementById("countCalled");
        const countDone = document.getElementById("countDone");

        function logout() { localStorage.removeItem("adminLoggedIn"); location.href = "admin-login.html"; }

        function updateBigCounts() {
            const activeContacts = contacts.filter(x => !x._deleted);
            const activeBookings = bookings.filter(x => !x._deleted);
            const all = [...activeContacts, ...activeBookings];
            countNew.innerText = all.filter(x => x.status === "New" || !x.status).length;
            countCalled.innerText = all.filter(x => x.status === "Called").length;
            countDone.innerText = all.filter(x => x.status === "Done").length;
        }

        async function loadContacts() {
            const r = await fetch(CONTACT_API);
            contacts = await r.json();
            contacts = Array.isArray(contacts) ? contacts : (contacts.data || []);
            renderContacts(); updateTrash(); updateBigCounts();
        }

        function renderContacts() {
            contactBody.innerHTML = "";
            const active = contacts.filter(x => !x._deleted);
            if (!active.length) { contactBody.innerHTML = "<tr><td colspan='7'>No contacts</td></tr>"; return; }
            active.forEach(r => {
                contactBody.innerHTML += `
<tr>
<td>${r.id}</td>
<td>${r.name}</td>
<td>${r.phone}</td>
<td>${r.email || "-"}</td>
<td>${r.message || "-"}</td>
<td>
<select onchange="setContactStatus(${r.id},this.value)">
<option ${r.status === "New" ? "selected" : ""}>New</option>
<option ${r.status === "Called" ? "selected" : ""}>Called</option>
<option ${r.status === "Done" ? "selected" : ""}>Done</option>
</select>
</td>
<td><button class="delete" onclick="softDelete(${r.id})">Delete</button></td>
</tr>`;
            });
        }

        function softDelete(id) {
            if (confirm("Move to trash?")) {
                const item = contacts.find(x => x.id === id);
                item._deleted = true;
                renderContacts(); updateTrash(); updateBigCounts();
            }
        }

        function updateTrash() {
            trash = contacts.filter(x => x._deleted);
            trashBody.innerHTML = "";
            if (!trash.length) { trashBody.innerHTML = "<tr><td colspan='5'>No deleted records</td></tr>"; return; }
            trash.forEach(r => {
                trashBody.innerHTML += `
<tr>
<td>${r.id}</td>
<td>${r.name}</td>
<td>${r.phone}</td>
<td>Contact</td>
<td><button class="restore" onclick="restore(${r.id})">Restore</button></td>
</tr>`;
            });
        }

        function restore(id) {
            const item = contacts.find(x => x.id === id);
            item._deleted = false;
            renderContacts(); updateTrash(); updateBigCounts();
        }

        async function setContactStatus(id, status) {
            await fetch(`${CONTACT_API}/${id}/status`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status })
            });
            loadContacts();
        }

        function showContacts() {
            tabContacts.classList.add("active");
            tabBookings.classList.remove("active");
            tabTrash.classList.remove("active");
            contactSection.style.display = "block";
            bookingSection.style.display = "none";
            trashSection.style.display = "none";
        }

        function showBookings() {
            tabBookings.classList.add("active");
            tabContacts.classList.remove("active");
            tabTrash.classList.remove("active");
            contactSection.style.display = "none";
            bookingSection.style.display = "block";
            trashSection.style.display = "none";
            loadBookings();
        }

        function showTrash() {
            tabTrash.classList.add("active");
            tabContacts.classList.remove("active");
            tabBookings.classList.remove("active");
            contactSection.style.display = "none";
            bookingSection.style.display = "none";
            trashSection.style.display = "block";
            updateTrash();
        }

        async function loadBookings() {
            const r = await fetch(BOOKING_API);
            bookings = await r.json();
            bookings = Array.isArray(bookings) ? bookings : [];
            renderBookings(); updateBigCounts();
        }

        function renderBookings() {
            bookingBody.innerHTML = "";
            if (!bookings.length) { bookingBody.innerHTML = "<tr><td colspan='6'>No bookings</td></tr>"; return; }
            bookings.forEach(b => {
                bookingBody.innerHTML += `
<tr>
<td>${b.id}</td>
<td>${b.patient_name}</td>
<td>${b.mobile}</td>
<td>${b.tests}</td>
<td>₹${b.total}</td>
<td>${b.status || "New"}</td>
</tr>`;
            });
        }

        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(contacts.filter(x => !x._deleted));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Contacts");
            XLSX.writeFile(wb, "medilab_contacts.xlsx");
        }

        loadContacts();
    </script>

</body>

</html>
